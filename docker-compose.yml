version: "3.9"

services:

  # ── Base de datos MySQL ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Si quieres correr scripts SQL al iniciar, descomenta:
      # - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # ── phpMyAdmin ─────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST:          ${PMA_HOST}
      PMA_PORT:          ${PMA_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── Backend FastAPI ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      # Hot-reload: sincroniza tu código local con el contenedor
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── Frontend Svelte ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: svelte_app
    restart: unless-stopped
    # El frontend NO expone puerto directamente; nginx lo maneja
    depends_on:
      - backend
    networks:
      - app_network

  # ── Nginx (reverse proxy) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

# ── Volúmenes persistentes ─────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Red interna compartida ─────────────────────────────────────────
networks:
  app_network:
    driver: bridge