<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="500" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d2340;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#071525;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0060a0;stop-opacity:0.05" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="750" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="45" cy="30" r="1"/><circle cx="120" cy="55" r="0.8"/><circle cx="200" cy="20" r="1.2"/>
    <circle cx="300" cy="40" r="0.7"/><circle cx="380" cy="15" r="1"/><circle cx="450" cy="60" r="0.9"/>
    <circle cx="80" cy="90" r="0.6"/><circle cx="160" cy="80" r="1.1"/><circle cx="260" cy="70" r="0.8"/>
    <circle cx="340" cy="85" r="1"/><circle cx="420" cy="45" r="0.7"/><circle cx="490" cy="30" r="0.9"/>
    <circle cx="30" cy="120" r="0.8"/><circle cx="100" cy="110" r="1"/><circle cx="220" cy="100" r="0.6"/>
  </g>

  <!-- Moon reflection glow on water -->
  <ellipse cx="250" cy="420" rx="80" ry="20" fill="#4090c0" opacity="0.08" filter="url(#softblur)"/>

  <!-- Moon -->
  <circle cx="250" cy="180" r="55" fill="#d4e8f5" opacity="0.12"/>
  <circle cx="250" cy="180" r="40" fill="#c8dff0" opacity="0.18"/>
  <circle cx="250" cy="180" r="28" fill="#b8d4e8" opacity="0.25"/>
  <!-- Moon crescent effect -->
  <circle cx="265" cy="172" r="28" fill="#0d2340" opacity="0.6"/>

  <!-- Treeline silhouette left -->
  <polygon points="0,400 30,330 50,370 70,300 90,360 110,310 130,350 150,380 150,420 0,420" fill="#060f1e"/>
  <polygon points="0,410 20,360 40,390 55,340 75,380 90,350 105,380 125,370 140,400 150,420 0,420" fill="#07121f"/>

  <!-- Treeline silhouette right -->
  <polygon points="350,420 370,380 390,350 410,380 430,340 450,370 470,330 490,370 500,400 500,420" fill="#060f1e"/>
  <polygon points="360,420 380,400 400,360 420,390 440,340 460,380 475,360 490,390 500,410 500,420" fill="#07121f"/>

  <!-- Lake/water surface -->
  <rect x="0" y="410" width="500" height="340" fill="url(#water)"/>

  <!-- Water ripples -->
  <ellipse cx="250" cy="430" rx="220" ry="8" fill="none" stroke="#1e5070" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="250" cy="455" rx="190" ry="6" fill="none" stroke="#1e5070" stroke-width="1" opacity="0.3"/>
  <ellipse cx="250" cy="475" rx="160" ry="5" fill="none" stroke="#1e5070" stroke-width="1" opacity="0.25"/>
  <ellipse cx="250" cy="490" rx="130" ry="4" fill="none" stroke="#1e5070" stroke-width="0.8" opacity="0.2"/>

  <!-- Moon reflection in water -->
  <ellipse cx="250" cy="500" rx="18" ry="60" fill="#7ab8d8" opacity="0.12"/>
  <line x1="250" y1="420" x2="250" y2="580" stroke="#90c8e8" stroke-width="1.5" opacity="0.08"/>

  <!-- Dark vignette overlay bottom -->
  <rect x="0" y="550" width="500" height="200" fill="url(#bg)" opacity="0.7"/>

  <!-- "N" Netflix badge (top left) -->
  <rect x="18" y="18" width="32" height="40" fill="#E50914" rx="2"/>
  <text x="21" y="50" font-family="Georgia, serif" font-size="30" font-weight="900" fill="white">N</text>

  <!-- OZARK title -->
  <text x="250" y="640" font-family="'Arial Black', 'Arial', sans-serif" font-size="76" font-weight="900" fill="white" text-anchor="middle" letter-spacing="14">OZARK</text>

  <!-- Subtitle line -->
  <text x="250" y="672" font-family="Arial, sans-serif" font-size="13" fill="#7ab8d8" text-anchor="middle" letter-spacing="5" font-weight="300">A NETFLIX ORIGINAL SERIES</text>

  <!-- Thin accent line -->
  <line x1="150" y1="686" x2="350" y2="686" stroke="#1e6090" stroke-width="1" opacity="0.8"/>
</svg>
